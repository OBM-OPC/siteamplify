services:
  - type: web
    name: siteamplify-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://siteamplify-frontend-2026.netlify.app
      - key: DATABASE_URL
        value: ./data/siteamplify.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
